<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Mi Bombonera</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;}
.app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:80px;}

/* HEADER */
.header{background:#1a3a6b;color:#fff;padding:16px;position:sticky;top:0;z-index:10;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.escudo{width:40px;height:40px;border-radius:50%;background:#f5c518;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.header h1{font-size:17px;font-weight:600;color:#fff;}
.header p{font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px;}

/* STATS MODE TOGGLE */
.stats-mode-toggle{display:flex;gap:4px;margin-bottom:10px;}
.mode-btn{padding:4px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.55);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.mode-btn.active{background:rgba(255,255,255,0.22);color:#fff;border-color:rgba(255,255,255,0.7);}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stat{background:rgba(255,255,255,0.12);border-radius:8px;padding:8px;text-align:center;}
.stat-num{font-size:18px;font-weight:600;color:#fff;line-height:1.2;}
.stat-label{font-size:10px;color:rgba(255,255,255,0.65);margin-top:2px;line-height:1.2;}

/* FILTERS */
.filters{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;background:#fff;border-bottom:1px solid #e5e7eb;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #d1d5db;background:#fff;font-size:13px;color:#6b7280;cursor:pointer;white-space:nowrap;}
.filter-btn.active{background:#1a3a6b;color:#fff;border-color:#1a3a6b;}

/* YEAR SECTION */
.year-header{padding:10px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;}
.year-header span{font-size:13px;font-weight:600;color:#374151;}
.year-badge{font-size:12px;color:#9ca3af;}

/* YEAR ATTENDANCE BADGE */
.year-att{font-size:11px;color:#0c4a6e;font-weight:700;background:#e0f2fe;border-radius:10px;padding:2px 8px;white-space:nowrap;}
.year-att .att-pct{font-weight:400;color:#0369a1;margin-left:2px;}

/* MATCH CARD */
.match-card{padding:14px 16px;border-bottom:1px solid #f3f4f6;background:#fff;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:background 0.15s;}
.match-card:active{background:#f9fafb;}
.match-body{flex:1;min-width:0;}
.match-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.match-rival{font-size:15px;font-weight:600;color:#111827;}
.score-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.score-g{background:#dcfce7;color:#15803d;}
.score-e{background:#fef9c3;color:#854d0e;}
.score-p{background:#fee2e2;color:#b91c1c;}
.match-meta{font-size:12px;color:#6b7280;margin-bottom:3px;}
.match-torneo{font-size:11px;color:#9ca3af;}
.cancha-alt-badge{display:inline-block;margin-left:5px;font-size:10px;font-weight:700;color:#7c3aed;background:#ede9fe;border-radius:4px;padding:1px 5px;cursor:default;vertical-align:middle;}

/* EXPANDED DETAIL */
.match-detail{margin-top:10px;padding:10px;background:#f9fafb;border-radius:8px;font-size:12px;color:#374151;}
.match-detail-row{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start;}
.match-detail-row:last-child{margin-bottom:0;}
.detail-label{color:#9ca3af;flex-shrink:0;width:64px;font-size:11px;padding-top:1px;}
.detail-val{color:#374151;flex:1;}
.loading-pill{display:inline-block;height:12px;border-radius:4px;background:#e5e7eb;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%,100%{opacity:0.4}50%{opacity:0.9}}
.memo-text{font-style:italic;color:#6b7280;}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 16px;color:#9ca3af;font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* YEAR COLLAPSIBLE */
.year-header{cursor:pointer;user-select:none;}
.year-header:hover{background:#f3f4f6;}
.year-chevron{font-size:12px;color:#9ca3af;transition:transform 0.2s;display:inline-block;}
.year-header.collapsed .year-chevron{transform:rotate(-90deg);}
.year-balance{font-size:12px;color:#6b7280;display:flex;gap:8px;}
.year-matches{transition:none;}

/* DESKTOP */
@media(min-width:768px){
  body{background:#e5e7eb;}
  .app{max-width:none;display:grid;grid-template-columns:280px 1fr;grid-template-rows:auto auto 1fr;min-height:100vh;box-shadow:none;}
  .header{grid-column:1/3;grid-row:1;border-radius:0;}
  .filters{grid-column:1;grid-row:3;border-right:1px solid #e5e7eb;overflow-y:auto;flex-direction:column;padding:16px;height:calc(100vh - 130px);position:sticky;top:130px;align-self:start;}
  .filters .filter-btn{text-align:left;border-radius:8px;}
  .search-wrap{grid-column:2;grid-row:2;padding:12px 20px;background:#fff;border-bottom:1px solid #e5e7eb;}
  #matches-container{grid-column:2;grid-row:3;overflow-y:auto;}
  .match-card{padding:16px 20px;}
  .match-rival{font-size:16px;}
  .year-header{padding:12px 20px;}
}

/* ATTENDANCE STATES */
.match-card.attended-g { background:#f0fdf4; border-left: 3px solid #16a34a; }
.match-card.attended-e { background:#fefce8; border-left: 3px solid #ca8a04; }
.match-card.attended-p { background:#fff1f2; border-left: 3px solid #e11d48; }
.match-card.not-attended { opacity: 0.38; filter: grayscale(0.4); border-left: 3px solid #e5e7eb; }
.match-card.not-attended:hover { opacity: 0.58; }

/* ATTENDED BADGE */
.att-badge { font-size: 10px; font-weight: 600; color: #15803d; background: #dcfce7; border-radius: 10px; padding: 2px 7px; white-space: nowrap; align-self: center; width: 64px; text-align: center; display: inline-block; }

/* HEADER ROW with badge */
.match-header { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.match-header-left { flex: 1; }
.match-header-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }


/* ATTENDANCE STAT BAR */
.attendance-stat{background:rgba(255,255,255,0.08);border-radius:8px;margin-top:8px;padding:6px 16px;text-align:center;font-size:11px;color:rgba(255,255,255,0.7);display:none;}
.attendance-stat span{color:#4ade80;font-weight:700;}
</style>

  <div id="matches-container"></div>
</div>

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Initialize attended from inline asistio field on each match
let attended = {};
MATCHES.forEach(m => { attended[m._id] = m.asistio !== false; });


async function initSupabase() {
  try {
    const { data } = await db.from('asistencias').select('id, asistio');
    if (data) data.forEach(row => { attended[row.id] = row.asistio; });
  } catch(e) {}
  renderAll();
}

// ── STATS MODE ──────────────────────────────────────────
function setStatsMode(mode) {
  statsMode = mode;
  document.getElementById('mode-boca').classList.toggle('active', mode === 'boca');
  document.getElementById('mode-yo').classList.toggle('active', mode === 'yo');
  renderStats();
  renderAll();
}

function renderStats() {
  const allG = MATCHES.filter(m => m.res === 'G').length;
  const allE = MATCHES.filter(m => m.res === 'E').length;
  const allP = MATCHES.filter(m => m.res === 'P').length;
  const allTotal = MATCHES.length;

  if (statsMode === 'boca') {
    document.getElementById('s-total').textContent = allTotal;
    document.getElementById('s-victorias').textContent = allG;
    document.getElementById('s-empates').textContent = allE;
    document.getElementById('s-derrotas').textContent = allP;
    document.getElementById('lbl-total').textContent = 'Partidos';
    document.getElementById('lbl-victorias').textContent = 'Victorias';
    document.getElementById('lbl-empates').textContent = 'Empates';
    document.getElementById('lbl-derrotas').textContent = 'Derrotas';
    document.getElementById('attendance-stat').style.display = 'none';
  } else {
    const myMs = MATCHES.filter(m => attended[m._id]);
    const myTotal = myMs.length;
    const pct = allTotal > 0 ? Math.round(myTotal / allTotal * 100) : 0;
    const myG = myMs.filter(m => m.res === 'G').length;
    const myE = myMs.filter(m => m.res === 'E').length;
    const myP = myMs.filter(m => m.res === 'P').length;
    document.getElementById('s-total').textContent = myTotal + '/' + allTotal;
    document.getElementById('s-victorias').textContent = myG + '/' + allG;
    document.getElementById('s-empates').textContent = myE + '/' + allE;
    document.getElementById('s-derrotas').textContent = myP + '/' + allP;
    document.getElementById('lbl-total').textContent = pct + '% asistencia';
    document.getElementById('lbl-victorias').textContent = 'V que vi';
    document.getElementById('lbl-empates').textContent = 'E que vi';
    document.getElementById('lbl-derrotas').textContent = 'D que vi';
    const pctG = allG > 0 ? Math.round(myG/allG*100) : 0;
    const pctE = allE > 0 ? Math.round(myE/allE*100) : 0;
    const pctP = allP > 0 ? Math.round(myP/allP*100) : 0;
    const attEl = document.getElementById('attendance-stat');
    attEl.style.display = 'block';
    attEl.innerHTML = 'Vi el <span>' + pctG + '%</span> de las victorias · <span>' + pctE + '%</span> de los empates · <span>' + pctP + '%</span> de las derrotas';
  }
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const labels = {todos:'Todos',victorias:'Victorias',empates:'Empates',derrotas:'Derrotas',superclasico:'Superclásico',clasicos:'Clásicos',libertadores:'Libertadores',sudamericana:'Sudamericana'};
    b.classList.toggle('active', b.textContent.trim() === labels[f]);
  });
  renderAll();
}

function getFiltered() {
  const q = (document.getElementById('search-input') ? document.getElementById('search-input').value : '').toLowerCase().trim();
  const CLASICOS_RIVALS = ['River','Racing','Independiente','San Lorenzo'];
  return MATCHES.filter(m => {
    if (q && !m.rival.toLowerCase().includes(q)) return false;
    if (activeFilter === 'victorias') return m.res === 'G';
    if (activeFilter === 'empates') return m.res === 'E';
    if (activeFilter === 'derrotas') return m.res === 'P';
    if (activeFilter === 'superclasico') return m.rival === 'River';
    if (activeFilter === 'clasicos') return CLASICOS_RIVALS.includes(m.rival);
    if (activeFilter === 'libertadores') return LIBERTADORES.includes(m.torneo);
    if (activeFilter === 'sudamericana') return SUDAMERICANA.includes(m.torneo);
    return true;
  });
}

function formatDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('es-AR', {weekday:'short', day:'numeric', month:'long', year:'numeric'});
}

function renderAll() {
  renderStats();
  const filtered = getFiltered();
  const container = document.getElementById('matches-container');

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>No hay partidos con este filtro</div>';
    return;
  }

  const byYear = {};
  filtered.forEach(m => {
    if (!byYear[m.year]) byYear[m.year] = [];
    byYear[m.year].push(m);
  });

  let html = '';
  Object.keys(byYear).sort((a,b)=>b-a).forEach(yr => {
    const yMs = byYear[yr].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const yG = yMs.filter(m=>m.res==='G').length;
    const yE = yMs.filter(m=>m.res==='E').length;
    const yP = yMs.filter(m=>m.res==='P').length;
    const yAtt = yMs.filter(m => attended[m._id]).length;
    const yAttPct = yMs.length > 0 ? Math.round(yAtt / yMs.length * 100) : 0;
    const isCollapsed = collapsedYears.has(String(yr));

    html += `<div class="year-header${isCollapsed?' collapsed':''}" onclick="toggleYear('${yr}')">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:15px;font-weight:600;color:#111827;">${yr}</span>
        <span class="year-chevron">▼</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        ${statsMode === 'yo' ? `<span class="year-att">${yAtt}/${yMs.length}<span class="att-pct"> ${yAttPct}%</span></span>` : ''}
        <div class="year-balance"><span style="color:#15803d;font-weight:600">${yG}G</span><span style="color:#854d0e;font-weight:600">${yE}E</span><span style="color:#b91c1c;font-weight:600">${yP}P</span></div>
        <span class="year-badge">${yMs.length} partidos</span>
      </div>
    </div>
    <div id="year-${yr}" style="display:${isCollapsed?'none':'block'}">`;

    yMs.forEach(m => {
      const isExp = expandedId === m._id;
      const ex = extraData[m._id];
      const resLabel = m.res==='G'?'V':m.res==='E'?'E':'D';
      const isAtt = attended[m._id];

      html += `<div class="match-card ${isAtt ? 'attended-' + m.res.toLowerCase() : 'not-attended'}" onclick="handleCardClick('${m._id}')">
        <div class="match-body">
          <div class="match-header">
            <span class="match-rival">Boca vs ${m.rival}${m.cancha_alt ? '<span class="cancha-alt-badge" title="Jugado en ' + m.cancha_alt + '">★ ' + m.cancha_alt + '</span>' : ''}</span>
            <div class="match-header-right">
              ${isAtt ? `<span class="att-badge">✓ Fui</span>` : `<span class="att-badge" style="background:#fee2e2;color:#b91c1c;">✗ Ausente</span>`}
              <span class="score-badge score-${m.res.toLowerCase()}">${m.score} ${resLabel}</span>
            </div>
          </div>
          <div class="match-meta">${formatDate(m.date)}</div>
          <div class="match-torneo">${m.torneo} · ${m.fecha}</div>
          ${isExp ? `<div class="match-detail">
            ${!ex || ex.loading ? `
              <div class="match-detail-row"><span class="detail-label">DT Boca</span><span class="loading-pill" style="width:110px"></span></div>
              <div class="match-detail-row"><span class="detail-label">DT Rival</span><span class="loading-pill" style="width:90px"></span></div>
              <div class="match-detail-row"><span class="detail-label">Goles</span><span class="loading-pill" style="width:150px"></span></div>
            ` : ex.error ? `<span style="color:#9ca3af;font-size:12px">No se pudo cargar la info</span>` : `
              <div class="match-detail-row"><span class="detail-label">DT Boca</span><span class="detail-val">${ex.dt_boca||'N/D'}</span></div>
              <div class="match-detail-row"><span class="detail-label">DT Rival</span><span class="detail-val">${ex.dt_rival||'N/D'}</span></div>
              <div class="match-detail-row"><span class="detail-label">Goles</span><span class="detail-val">${ex.goleadores||'-'}</span></div>
              ${m.cancha_alt?`<div class="match-detail-row"><span class="detail-label">Cancha</span><span class="detail-val" style="color:#7c3aed;">${m.cancha_alt}</span></div>`:''}
              ${ex.nota?`<div class="match-detail-row"><span class="detail-label">Memo</span><span class="detail-val memo-text">${ex.nota}</span></div>`:''}
            `}
          </div>` : ''}
        </div>
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

const collapsedYears = new Set(MATCHES.map(m=>String(m.year)));
function toggleYear(yr) {
  if (collapsedYears.has(yr)) collapsedYears.delete(yr);
  else collapsedYears.add(yr);
  renderAll();
}

function handleCardClick(id) {
  toggleExpand(id);
}

function toggleExpand(id) {
  if (expandedId === id) { expandedId = null; renderAll(); return; }
  expandedId = id;
  renderAll();
  const match = MATCHES.find(m => m._id === id);
  if (match && (!extraData[id] || extraData[id].error)) fetchExtraData(match);
}

function fetchExtraData(match) {
  const id = match._id;
  const src = MATCHES.find(m => m.date === match.date && m.rival === match.rival);
  if (src && src.dt_boca) {
    extraData[id] = {
      loading: false,
      dt_boca: src.dt_boca,
      dt_rival: src.dt_rival || 'N/D',
      goleadores: src.goleadores || '-',
      nota: src.nota || ''
    };
  } else {
    extraData[id] = { loading: false, dt_boca: 'Próximamente', dt_rival: 'Próximamente', goleadores: 'Próximamente' };
  }
  renderAll();
}

window.addEventListener("DOMContentLoaded", () => {
  renderAll(); // render inmediato con datos del array
  initSupabase(); // luego actualiza con datos de Supabase en background
});
</script>
</body>
</html>
